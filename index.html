    <script>
        // Variabel dari Server (Injeksi Scriptlet GAS)
        let targetEmail = "<?= targetEmail ?>"; 
        if (targetEmail.includes("?=")) targetEmail = ""; // Fallback localhost
        
        const SUPER_ADMIN = "syamsul18782@gmail.com";
        let currentUser = "";
        let isSuperAdmin = false;
        let isOwner = false;
        let familyDataCache = [];
        let chart;

        // Inisialisasi Pemuatan Awal
        window.onload = function() {
            if (targetEmail) {
                // Ada target email di URL, coba muat datanya (bisa publik, bisa privat)
                loadData();
            } else {
                // Landing state (Tidak ada target)
                tampilkanWelcomeScreen();
            }
        };

        // UI Controls
        function openLoginModal() { document.getElementById('loginModal').classList.remove('hidden'); }
        function closeLoginModal() { document.getElementById('loginModal').classList.add('hidden'); }
        function openFormModal() { 
            if (!currentUser) {
                Swal.fire({ title: 'Akses Terbatas', text: 'Anda harus Login terlebih dahulu untuk menambah atau mengubah data silsilah.', icon: 'info', confirmButtonText: 'Login Sekarang' }).then((result) => {
                    if(result.isConfirmed) openLoginModal();
                });
                return;
            }
            
            // Set default target jika kosong
            if (!targetEmail) {
                targetEmail = currentUser;
                document.getElementById('ownerNameDisplay').innerText = targetEmail;
                loadData(); // Load agar chart siap
            }
            
            document.getElementById('memberModal').classList.remove('hidden'); 
            
            // Cek apakah ini anggota pertama
            const selectHubungan = document.getElementById('hubungan');
            if (familyDataCache.length === 0) {
                selectHubungan.value = 'Kepala Keluarga';
                selectHubungan.classList.add('pointer-events-none', 'bg-gray-200'); // Kunci form
                document.getElementById('privasiDiv').classList.remove('hidden');
            } else {
                selectHubungan.classList.remove('pointer-events-none', 'bg-gray-200');
                if(selectHubungan.value === 'Kepala Keluarga') selectHubungan.value = 'Anak';
                document.getElementById('privasiDiv').classList.add('hidden');
            }
            // Trigger change untuk parentDiv
            selectHubungan.dispatchEvent(new Event('change'));
        }
        function closeFormModal() { document.getElementById('memberModal').classList.add('hidden'); document.getElementById('familyForm').reset(); }
        
        // Logika Hubungan (Parent Div Toggle)
        document.getElementById('hubungan').addEventListener('change', function(e) {
            const val = e.target.value;
            const parentDiv = document.getElementById('parentDiv');
            const privasiDiv = document.getElementById('privasiDiv');
            
            if(val === 'Anak') {
                parentDiv.classList.remove('hidden');
                document.getElementById('idParent').required = true;
            } else {
                parentDiv.classList.add('hidden');
                document.getElementById('idParent').required = false;
            }

            if(val === 'Kepala Keluarga' && familyDataCache.length === 0) {
                privasiDiv.classList.remove('hidden');
            } else {
                privasiDiv.classList.add('hidden');
            }
        });

        function logoutSSO() {
            currentUser = ""; isSuperAdmin = false; isOwner = false;
            
            // Update UI
            document.getElementById('btnLogin').classList.remove('hidden');
            document.getElementById('btnLogout').classList.add('hidden');
            document.getElementById('userEmailBadge').classList.add('hidden');
            document.getElementById('btnSuperAdmin').classList.add('hidden');
            document.getElementById('roleBadge').innerText = 'Guest (Publik)';
            document.getElementById('roleBadge').className = 'font-semibold text-gray-500 bg-gray-200 px-2 py-0.5 rounded';
            document.getElementById('proposalContainer').classList.add('hidden');
            
            Swal.fire({toast:true, position:'top-end', icon:'success', title:'Logout Berhasil', showConfirmButton:false, timer:2000});
            if(targetEmail) loadData(); else tampilkanWelcomeScreen();
        }

        // Decode JWT Google SSO
        function decodeJwtResponse(token) {
            let base64Url = token.split('.')[1];
            let base64 = base64Url.replace(/-/g, '+').replace(/_/g, '/');
            let jsonPayload = decodeURIComponent(atob(base64).split('').map(function(c) {
                return '%' + ('00' + c.charCodeAt(0).toString(16)).slice(-2);
            }).join(''));
            return JSON.parse(jsonPayload);
        }

        // Callback Login GSI
        window.handleCredentialResponse = function(response) {
            closeLoginModal();
            Swal.fire({title: 'Otentikasi...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
            
            try {
                const payload = decodeJwtResponse(response.credential);
                currentUser = payload.email;
                
                // Set logic role
                isSuperAdmin = (currentUser === SUPER_ADMIN);
                
                // Jika user login namun belum buka link silsilah siapa-siapa, arahkan ke miliknya
                if (!targetEmail || targetEmail === "undefined" || targetEmail === "") {
                    targetEmail = currentUser;
                }

                isOwner = (currentUser === targetEmail) || isSuperAdmin;
                
                // Update UI Navbar
                document.getElementById('userEmailBadge').innerText = currentUser;
                document.getElementById('userEmailBadge').classList.remove('hidden');
                document.getElementById('btnLogin').classList.add('hidden');
                document.getElementById('btnLogout').classList.remove('hidden');
                
                let roleBadgeObj = document.getElementById('roleBadge');
                if (isSuperAdmin) {
                    roleBadgeObj.innerText = '👑 Super Admin';
                    roleBadgeObj.className = 'font-bold text-purple-700 bg-purple-100 px-2 py-0.5 rounded shadow-sm';
                    document.getElementById('btnSuperAdmin').classList.remove('hidden');
                } else {
                    roleBadgeObj.innerText = isOwner ? 'Pemilik (Owner)' : 'Kontributor (Guest)';
                    roleBadgeObj.className = isOwner ? 'font-semibold text-green-700 bg-green-100 px-2 py-0.5 rounded' : 'font-semibold text-blue-700 bg-blue-100 px-2 py-0.5 rounded';
                }
                
                if(!isOwner) {
                    document.getElementById('modalTitle').innerText = "Ajukan Penambahan Anggota";
                    document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-paper-plane mr-2"></i> Kirim Pengajuan (Proposal)';
                } else {
                    document.getElementById('modalTitle').innerText = "Tambah Anggota Silsilah";
                    document.getElementById('btnSubmit').innerHTML = '<i class="fa-solid fa-save mr-2"></i> Simpan Langsung';
                }

                Swal.close();

                // Panggil data keluarga berdasarkan targetEmail
                if (typeof google !== 'undefined' && google.script) {
                    loadData();
                    if(isOwner) loadProposals();
                } else {
                    Swal.fire('Info', 'Login berhasil (Simulasi Lokal).', 'info');
                }
            } catch (e) {
                Swal.fire('Error', 'Gagal memproses login: ' + e.message, 'error');
            }
        };

                    </div>

                    <!-- Bagian Kanan: Ilustrasi Profesional dengan Glassmorphism -->

                            </div>
                        </div>
                        
                        <!-- Aesthetic overlay border -->
                        <div class="absolute inset-0 border-[8px] border-white/5 rounded-l-3xl z-20 pointer-events-none m-4"></div>
                    </div>
                </div>
            `;
        }

        // Mengambil Data Keluarga (Mendukung Cek Public/Private)
        function loadData() {
            if(!targetEmail) return;
            document.getElementById('loadingChart').style.display = 'flex';
            document.getElementById('treeContainer').style.display = 'none';
            document.getElementById('ownerNameDisplay').innerText = targetEmail;

            google.script.run.withSuccessHandler(function(res) {
                if (res.status === 'error' && res.message === 'PRIVATE_TREE') {
                    // Silsilah Tertutup, minta login
                    document.getElementById('loadingChart').style.display = 'none';
                    document.getElementById('treeContainer').style.display = 'block';
                    document.getElementById('privacyBadge').innerText = "🔒 Tertutup";
                    document.getElementById('privacyBadge').className = "text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold align-middle mt-1 bg-red-100 text-red-700 inline-block";
                    
                    document.getElementById('treeContainer').innerHTML = `
                        <div class="flex flex-col h-full items-center justify-center text-gray-500 py-16">
                            <div class="bg-red-50 p-5 rounded-full mb-5">
                                <i class="fas fa-lock text-6xl text-red-400"></i>
                            </div>
                            <h2 class="text-2xl font-bold text-gray-800 mb-2">Silsilah Bersifat Tertutup</h2>
                            <p class="text-sm text-center max-w-sm mb-6">Pemilik mengatur silsilah ini secara privat. Anda harus login dan memiliki hak akses untuk melihat silsilah ini.</p>
                            <button onclick="openLoginModal()" class="px-6 py-2.5 bg-blue-600 text-white rounded-xl shadow-md font-bold hover:bg-blue-700 transition">
                                Login Sekarang
                            </button>
                        </div>
                    `;
                } else if (res.status === 'success') {
                    // Update Badge
                    const pBadge = document.getElementById('privacyBadge');
                    pBadge.classList.remove('hidden');
                    if(res.isPrivate) {
                        pBadge.innerText = "🔒 Tertutup"; pBadge.className = "text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold align-middle mt-1 bg-red-100 text-red-700 inline-block";
                    } else {
                        pBadge.innerText = "🔓 Terbuka Publik"; pBadge.className = "text-[10px] px-2 py-0.5 rounded-full uppercase tracking-wider font-bold align-middle mt-1 bg-green-100 text-green-700 inline-block";
                    }

                    familyDataCache = JSON.parse(res.data);
                    renderTree(familyDataCache);
                    populateDropdowns();
                } else {
                    Swal.fire('Error', res.message, 'error');
                }
            }).withFailureHandler(function(err){
                Swal.fire('Server Error', err.message, 'error');
            }).getFamilyData(targetEmail, currentUser);
        }

        // Mengambil Data Proposal
        function loadProposals() {
            if(!currentUser) return;
            google.script.run.withSuccessHandler(function(jsonStr) {
                const proposals = JSON.parse(jsonStr);
                if (proposals.length > 0) {
                    document.getElementById('proposalContainer').classList.remove('hidden');
                    let html = '<ul class="mt-2 space-y-3">';
                    proposals.forEach(p => {
                        let detail = JSON.parse(p.Data_Perubahan_JSON);
                        let targetInfo = detail.AdminInfo_TargetOwner ? `<br><span class="text-xs text-purple-600 mt-1 inline-block bg-purple-50 px-2 py-0.5 rounded"><i class="fas fa-crown"></i> <b>Super Admin View:</b> Milik ${detail.AdminInfo_TargetOwner}</span>` : '';
                        
                        html += `
                        <li class="flex justify-between items-center bg-white p-3.5 rounded-xl border border-yellow-200 shadow-sm">
                            <div class="text-sm text-gray-800"><b>${detail.Nama}</b> (${detail.Hubungan}) diajukan oleh <b class="text-blue-600">${p.Pengaju_Email}</b>${targetInfo}</div>
                            <div class="ml-4 flex-shrink-0 flex gap-2">
                                <button onclick="handleProposal('${p.ID_Proposal}', 'approve')" class="text-green-700 bg-green-100 hover:bg-green-200 px-3 py-1.5 rounded-lg text-xs font-bold transition"><i class="fas fa-check mr-1"></i> Terima</button>
                                <button onclick="handleProposal('${p.ID_Proposal}', 'reject')" class="text-red-700 bg-red-100 hover:bg-red-200 px-3 py-1.5 rounded-lg text-xs font-bold transition"><i class="fas fa-times mr-1"></i> Tolak</button>
                            </div>
                        </li>`;
                    });
                    html += '</ul>';
                    document.getElementById('proposalList').innerHTML = html;
                } else {
                    document.getElementById('proposalContainer').classList.add('hidden');
                }
            }).getProposals(currentUser);
        }

        // Render D3 Org Chart
        function renderTree(data) {
            document.getElementById('loadingChart').style.display = 'none';
            document.getElementById('treeContainer').style.display = 'block';

            if (data.length === 0) {
                document.getElementById('treeContainer').innerHTML = `
                    <div class="flex flex-col h-full items-center justify-center text-gray-500 py-16">
                        <div class="bg-gray-100 p-6 rounded-full mb-4">
                            <i class="fas fa-user-plus text-5xl text-gray-400"></i>
                        </div>
                        <h2 class="text-xl font-bold text-gray-700 mb-2">Silsilah Masih Kosong</h2>
                        <p class="text-sm text-center max-w-sm mb-6">Belum ada anggota yang ditambahkan. Silakan klik tombol 'Tambah Anggota' untuk memulai silsilah ini.</p>
                    </div>`;
                return;
            }

            const chartData = data.map(d => {
                let parentId = d.ID_Parent;
                if (!parentId || parentId === "") parentId = "";
                return {
                    id: d.ID_Anggota, parentId: parentId, name: d.Nama, positionName: d.Hubungan,
                    imageUrl: d.URL_Foto || "https://ui-avatars.com/api/?name=" + encodeURIComponent(d.Nama) + "&background=random",
                    gender: d.Jenis_Kelamin
                };
            });

            if (!chart) {
                chart = new d3.OrgChart().container('.chart-container').data(chartData).nodeWidth(d => 220).initialZoom(0.8).nodeHeight(d => 110).childrenMargin(d => 40).compactMarginBetween(d => 20).compactMarginPair(d => 20)
                    .nodeContent(function(d, i, arr, state) {
                        const color = d.data.gender === 'L' ? '#eff6ff' : '#fdf2f8'; 
                        const borderColor = d.data.gender === 'L' ? '#3b82f6' : '#ec4899';
                        const iconGen = d.data.gender === 'L' ? '<i class="fas fa-mars text-blue-400"></i>' : '<i class="fas fa-venus text-pink-400"></i>';
                        return `
                            <div class="node-card relative" style="background-color:${color}; border: 2px solid ${borderColor}; border-radius: 12px; width: ${d.width}px; height: ${d.height}px; display: flex; align-items: center; padding: 12px; box-sizing: border-box;">
                                <div class="absolute top-2 right-2 text-xs opacity-60">${iconGen}</div>
                                <img src="${d.data.imageUrl}" style="width: 56px; height: 56px; border-radius: 50%; object-fit: cover; border: 3px solid white; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-right: 14px;" />
                                <div style="width:calc(100% - 70px); overflow:hidden;">
                                    <div style="font-weight: 800; font-size: 15px; color: #1f2937; white-space:nowrap; text-overflow:ellipsis; overflow:hidden;" title="${d.data.name}">${d.data.name}</div>
                                    <div style="font-size: 11px; color: #6b7280; margin-top: 4px; text-transform: uppercase; font-weight:600 bg-white px-2 py-0.5 rounded inline-block shadow-sm border border-gray-100">${d.data.positionName}</div>
                                </div>
                            </div>
                        `;
                    }).render();
            } else {
                chart.data(chartData).render();
                chart.expandAll();
            }
        }

        function populateDropdowns() {
            const parentSelect = document.getElementById('idParent');
            parentSelect.innerHTML = '<option value="">-- Pilih --</option>';
            familyDataCache.forEach(d => {
                let opt = document.createElement('option');
                opt.value = d.ID_Anggota;
                opt.text = d.Nama + " (" + d.Hubungan + ")";
                parentSelect.appendChild(opt);
            });
        }

        function copyShareLink() {
            if(!targetEmail) return Swal.fire('Oops', 'Silsilah belum dipilih.', 'info');
            // Ganti EXEC_URL dengan URL script gas anda saat di deploy
            const url = "https://script.google.com/macros/s/EXEC_URL/exec?email=" + targetEmail;
            navigator.clipboard.writeText(url).then(() => {
                Swal.fire({ title: 'Tersalin!', text: 'Link siap dibagikan. Pastikan edit EXEC_URL di kode Anda.', icon: 'success', timer: 3000 });
            });
        }

        function submitForm(e) {
            e.preventDefault();
            
            const btnSubmit = document.getElementById('btnSubmit');
            btnSubmit.disabled = true;
            btnSubmit.innerHTML = '<i class="fas fa-spinner fa-spin mr-2"></i> Mengirim...';

            const fileInput = document.getElementById('foto');
            let file = fileInput.files[0];
            
            let formData = {
                targetOwnerEmail: targetEmail,
                pengajuEmail: currentUser,
                nama: document.getElementById('nama').value,
                jenisKelamin: document.getElementById('jenisKelamin').value,
                hubungan: document.getElementById('hubungan').value,
                idParent: document.getElementById('idParent').value,
                privasi: document.getElementById('privasiSilsilah').value, // public/private
                fotoBase64: null,
                fotoName: null
            };

            if (file) {
                const reader = new FileReader();
                reader.onload = function(e) {
                    formData.fotoBase64 = e.target.result;
                    formData.fotoName = file.name;
                    sendDataToServer(formData);
                };
                reader.readAsDataURL(file);
            } else {
                sendDataToServer(formData);
            }
        }

        function sendDataToServer(formData) {
            google.script.run.withSuccessHandler(function(res) {
                closeFormModal();
                Swal.fire({ title: res.success ? 'Berhasil!' : 'Gagal', text: res.message, icon: res.success ? 'success' : 'error' });
                if(res.success) loadData(); // Reload data
                document.getElementById('btnSubmit').disabled = false;
            }).withFailureHandler(function(err){
                Swal.fire('Error System', err.message, 'error');
                document.getElementById('btnSubmit').disabled = false;
            }).processFamilyData(formData);
        }

        function handleProposal(id, action) {
            Swal.fire({
                title: 'Konfirmasi', text: action === 'approve' ? "Setujui anggota ini masuk silsilah?" : "Tolak pengajuan ini?", icon: 'warning', showCancelButton: true, confirmButtonText: 'Ya, Lanjutkan'
            }).then((result) => {
                if (result.isConfirmed) {
                    const funcName = action === 'approve' ? 'approveProposal' : 'rejectProposal';
                    Swal.fire({title: 'Memproses...', allowOutsideClick: false, didOpen: () => { Swal.showLoading(); }});
                    google.script.run.withSuccessHandler(res => {
                        Swal.fire('Selesai', res.message, 'success');
                        loadData();
                        loadProposals();
                    })[funcName](id, currentUser);
                }
            });
        }

        // Admin Tool: Cari / Pantau Silsilah
        function cariSilsilahAdmin() {
            Swal.fire({
                title: 'Cari Silsilah Keluarga',
                html: '<p class="text-sm text-gray-600 mb-4">Masukkan Email Pemilik Silsilah untuk melihat silsilah mereka:</p>',
                input: 'email',
                inputPlaceholder: 'contoh: kerabat@gmail.com',
                showCancelButton: true,
                confirmButtonText: '<i class="fas fa-search"></i> Lihat',
                cancelButtonText: 'Batal',
                confirmButtonColor: '#3b82f6'
            }).then((result) => {
                if (result.isConfirmed && result.value) {
                    targetEmail = result.value;
                    
                    // Re-evaluate kepemilikan
                    isOwner = (currentUser === targetEmail) || isSuperAdmin;
                    if(!isOwner && currentUser) {
                        document.getElementById('roleBadge').innerText = 'Kontributor (Guest)';
                        document.getElementById('roleBadge').className = 'font-semibold text-blue-700 bg-blue-100 px-2 py-0.5 rounded';
                    } else if (isOwner && !isSuperAdmin && currentUser) {
                        document.getElementById('roleBadge').innerText = 'Pemilik (Owner)';
                        document.getElementById('roleBadge').className = 'font-semibold text-green-700 bg-green-100 px-2 py-0.5 rounded';
                    }
                    
                    loadData();
                }
            });
        }
    </script>
</body>
</html>
